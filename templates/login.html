<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — PhishGuard</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
<div class="scanline-overlay"></div>
<div class="grid-bg"></div>

<nav class="navbar">
  <a class="nav-brand" href="/">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <path d="M14 2L3 7v8c0 6.1 4.7 11.8 11 13 6.3-1.2 11-6.9 11-13V7L14 2z" stroke="var(--accent)" stroke-width="1.5" fill="none"/>
      <path d="M9 14l3.5 3.5L19 10" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <span>PhishGuard</span>
  </a>
  <div class="nav-links">
    <button class="theme-toggle" id="themeToggle">☀</button>
  </div>
</nav>

<div class="auth-container">
  <div class="auth-card">
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to access your scan history and analytics</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}
          <div class="flash-msg">{{ m }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label class="form-label">USERNAME</label>
        <input class="form-input" type="text" name="username" required autocomplete="username"/>
      </div>
      <div class="form-group">
        <label class="form-label">PASSWORD</label>
        <input class="form-input" type="password" name="password" required autocomplete="current-password"/>
      </div>
      <button class="btn-submit" type="submit">Login</button>
    </form>

    <div class="auth-switch">
      Don't have an account? <a href="/signup">Sign up</a>
    </div>
  </div>
</div>

<script>
const html = document.documentElement;
const themeToggle = document.getElementById('themeToggle');
html.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');
themeToggle.addEventListener('click', () => {
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
});
</script>
</body>
</html>
